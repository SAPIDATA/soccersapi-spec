    get:
      summary: Search Match
      deprecated: false
      description: >-
        Find a specific match by keyword (team names, league, etc.).  

        Returns match ID and basic details for use in match endpoints.


        **Example:**

        ```bash

        curl -L -g
        "https://api.soccersapi.com/v2.2/search/?user={{USERNAME}}&token={{TOKEN}}&t=match&q=salzburg"
      tags:
        - Search
      parameters:
        - name: user
          in: query
          description: ''
          required: true
          example: '{{USERNAME}}'
          schema:
            type: string
        - name: token
          in: query
          description: ''
          required: true
          example: '{{TOKEN}}'
          schema:
            type: string
        - name: t
          in: query
          description: ''
          required: true
          example: match
          schema:
            type: string
        - name: q
          in: query
          description: ''
          required: true
          example: salzburg
          schema:
            type: string
        - name: utc
          in: query
          description: ''
          required: true
          example: '2'
          schema:
            type: string
      responses:
