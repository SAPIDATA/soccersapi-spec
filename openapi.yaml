  /v2.2/countries/:
    get:
      summary: Country by ID
      deprecated: false
      description: >
        The **Country by ID** endpoint retrieves detailed information about a
        single country using its unique `id`.  

        It returns the country’s name, ISO code, continent, and image flag.  


        This endpoint is useful when you already know a `country_id` (for
        example, from a league, team, or venue object) and want to confirm its
        details or display localized information in your app.  


        ### Typical Use Cases

        - Show the full country profile on a team, player, or league page.  

        - Validate a `country_id` before using it in another request.  

        - Power country selectors with localized names and flags.  


        Example: requesting `id=15` returns details for **Austria**.  


        ### Example Request

        ```bash

        curl -L -g
        "https://api.soccersapi.com/v2.2/countries/?user={{USERNAME}}&token={{TOKEN}}&t=info&id=15"
